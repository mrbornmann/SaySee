<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0F0C29" />
    <meta name="description" content="SaySee — AAC Visual Learning App for special education" />

    <!-- iOS home screen support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SaySee" />

    <title>SaySee</title>

    <!-- Fonts preloaded for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #F4F6FB;
        font-family: 'Nunito', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }
      #root { min-height: 100vh; }

      /* Loading screen shown before React loads */
      #splash {
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, #0F0C29, #302B63, #24243E);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      #splash.hide { opacity: 0; pointer-events: none; }
      #splash-title {
        font-size: 52px;
        color: #fff;
        letter-spacing: 2px;
      }
      #splash-sub {
        font-size: 14px;
        color: rgba(255,255,255,0.5);
        letter-spacing: 1px;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <!-- Splash screen while app loads -->
    <div id="splash">
      <div id="splash-title">👁️ SaySee</div>
      <div id="splash-sub">AAC Visual Learning</div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Hide splash once React has loaded
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('splash');
          if (splash) {
            splash.classList.add('hide');
            setTimeout(() => splash.remove(), 500);
          }
        }, 800);
      });
    </script>
  </body>
</html>
