<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="SaySee© AAC Visual Learning — Voice-activated visual support for every student" />

    <!-- PWA / App meta -->
    <meta name="theme-color" content="#5AAB2A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SaySee" />
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS icon — uses your actual square logo -->
    <link rel="apple-touch-icon" href="https://i.postimg.cc/4NXv4Pst/Logo-Main-See-Say.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>SaySee© — AAC Visual Learning</title>

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      /* Splash screen — shows while React loads, matches your brand */
      body {
        background: #1B4F9E;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Arial, sans-serif;
      }

      #splash {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, #1B4F9E, #2B6CB0);
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      #splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #splash img {
        width: 140px;
        height: 140px;
        object-fit: contain;
        border-radius: 24px;
      }
      #splash-name {
        font-size: 36px;
        font-weight: 900;
        color: #5AAB2A;
        letter-spacing: 1px;
      }
      #splash-sub {
        font-size: 13px;
        color: rgba(255,255,255,0.6);
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      #root { min-height: 100vh; background: #F4F6FB; }
    </style>
  </head>
  <body>

    <!-- Splash screen shown while app loads -->
    <div id="splash">
      <img src="https://i.postimg.cc/4NXv4Pst/Logo-Main-See-Say.png" alt="SaySee" />
      <div id="splash-name">SaySee©</div>
      <div id="splash-sub">AAC Visual Learning</div>
    </div>

    <div id="root"></div>

    <script type="module" src="./src/main.jsx"></script>

    <script>
      // Hide splash once React has fully loaded
      window.addEventListener('load', function() {
        setTimeout(function() {
          var splash = document.getElementById('splash');
          if (splash) {
            splash.classList.add('fade-out');
            setTimeout(function() {
              if (splash.parentNode) splash.parentNode.removeChild(splash);
            }, 500);
          }
        }, 1200);
      });

      // Register service worker for PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js')
            .then(function(reg) { console.log('SaySee PWA ready'); })
            .catch(function(err) { console.log('SW:', err); });
        });
      }
    </script>
  </body>
</html>
